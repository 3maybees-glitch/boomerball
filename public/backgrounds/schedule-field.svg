<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="#841617">
  <!-- Football field aerial -->
  <rect x="80" y="80" width="640" height="340" rx="20" fill="none" stroke="#841617" stroke-width="8" opacity="0.6"/>
  <rect x="120" y="120" width="560" height="260" fill="none" stroke="#841617" stroke-width="3" opacity="0.4"/>
  <line x1="400" y1="120" x2="400" y2="380" stroke="#841617" stroke-width="3" opacity="0.35"/>
  <rect x="120" y="200" width="80" height="100" fill="none" stroke="#841617" stroke-width="2" opacity="0.3"/>
  <rect x="600" y="200" width="80" height="100" fill="none" stroke="#841617" stroke-width="2" opacity="0.3"/>
  <!-- Yard markers -->
  <line x1="200" y1="120" x2="200" y2="380" stroke="#841617" stroke-width="1.5" opacity="0.2"/>
  <line x1="280" y1="120" x2="280" y2="380" stroke="#841617" stroke-width="1.5" opacity="0.2"/>
  <line x1="520" y1="120" x2="520" y2="380" stroke="#841617" stroke-width="1.5" opacity="0.2"/>
  <line x1="600" y1="120" x2="600" y2="380" stroke="#841617" stroke-width="1.5" opacity="0.2"/>
  <!-- Calendar icon -->
  <rect x="620" y="60" width="100" height="90" rx="8" opacity="0.5"/>
  <line x1="620" y1="90" x2="720" y2="90" stroke="#fdf9d8" stroke-width="4"/>
</svg>
